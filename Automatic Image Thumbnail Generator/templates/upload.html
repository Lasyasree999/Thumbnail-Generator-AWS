<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #232f3e; --secondary: #ff9900; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        .navbar { background: var(--primary); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; color: white; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); border-left: 5px solid var(--secondary); padding-left: 15px; }
        .upload-box { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 8px; margin-top: 20px; transition: 0.3s; }
        .upload-box:hover { border-color: var(--secondary); background: #fffcf5; }
        input[type="file"] { margin: 20px 0; }
        .btn-upload { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; width: 100%; cursor: pointer; font-size: 1rem; }
        .btn-upload:hover { background: #37475a; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><h2>CloudThumb</h2></div>
        <div><a href="/dashboard" style="color:white; text-decoration:none;">Back to Dashboard</a></div>
    </nav>
    <div class="container">
        <h2>Upload New Image</h2>
        <p>Select an image (JPG, PNG) to generate a high-quality thumbnail.</p>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-box">
                <input type="file" name="image" accept="image/*" required>
            </div>
            <button type="submit" class="btn-upload">Process Image</button>
        </form>
    </div>
</body>
</html>
