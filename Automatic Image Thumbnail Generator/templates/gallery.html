<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --primary: #232f3e; --secondary: #ff9900; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        .navbar { background: var(--primary); padding: 1rem 5%; color: white; display:flex; justify-content: space-between; align-items:center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 40px 5%; }
        .img-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .img-card img { width: 100%; height: 200px; object-fit: cover; }
        .thumb-area { padding: 15px; background: #f9f9f9; border-top: 1px solid #eee; text-align: center; }
        .thumb-preview { width: 80px; height: 80px; border: 2px solid var(--secondary); border-radius: 5px; margin-top: 10px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: #e3f2fd; color: #1976d2; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2>My Gallery</h2>
        <a href="/dashboard" style="color:white;">Dashboard</a>
    </nav>
    <div class="gallery-grid">
        {% for img in images %}
        <div class="img-card">
            <img src="{{ img[3] }}" alt="Original">
            <div class="thumb-area">
                <p><strong>{{ img[2][:20] }}...</strong></p>
                <span class="status-badge">{{ img[5] }}</span>
                <br>
                {% if img[5] == 'Queued' %}
                    <p style="font-size: 0.8rem;">Thumbnail generating...</p>
                {% else %}
                    <img src="https://{{ config['S3_BUCKET_NAME'] }}.s3.amazonaws.com/thumbnails/{{ img[2] }}" class="thumb-preview">
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
